particles:
  -
    word: "pa"
    pronunciation: "PA"
    type: "tense"
    meaning: "past action"
    usage: "Place before the verb for action before the speech moment."
    example: "Na pa mar dev."
  -
    word: "nu"
    pronunciation: "NU"
    type: "tense"
    meaning: "present or progressive action"
    usage: "Marks action happening now or currently unfolding."
    example: "Na nu ban kot."
  -
    word: "fu"
    pronunciation: "FU"
    type: "tense"
    meaning: "future action"
    usage: "Marks action after the speech moment."
    example: "Na fu tar mo mik."
  -
    word: "ka"
    pronunciation: "KA"
    type: "aspect"
    meaning: "completed action"
    usage: "Marks completion or already-accomplished state."
    example: "Lem ka mar."
  -
    word: "ga"
    pronunciation: "GA"
    type: "aspect"
    meaning: "ongoing or habitual action"
    usage: "Marks continuing practice or repeated conduct."
    example: "Lem ga naf bi mar."
  -
    word: "va"
    pronunciation: "VA"
    type: "aspect"
    meaning: "intended action"
    usage: "Marks intended, planned, or conditional action."
    example: "Na va pat ko ti."
  -
    word: "kan"
    pronunciation: "KAN"
    type: "moral agency"
    meaning: "can; has capacity"
    usage: "Capability without permission or duty."
    example: "Na kan kav."
  -
    word: "lun"
    pronunciation: "LUN"
    type: "moral agency"
    meaning: "may; is permitted"
    usage: "Permission granted by a person, law, or fitting order."
    example: "Ta lun pat."
  -
    word: "wen"
    pronunciation: "WEN"
    type: "moral agency"
    meaning: "want; desire"
    usage: "Desire without yet choosing."
    example: "Na wen mav."
  -
    word: "vel"
    pronunciation: "VEL"
    type: "moral agency"
    meaning: "choose"
    usage: "Personal election of a path or duty."
    example: "Na vel dev se."
  -
    word: "cel"
    pronunciation: "CEL"
    type: "moral agency"
    meaning: "should; fitting obligation"
    usage: "Normative pressure from truth, wisdom, or right measure."
    example: "Na cel tar."
  -
    word: "dom"
    pronunciation: "DOM"
    type: "moral agency"
    meaning: "owe"
    usage: "Debt or obligation already standing."
    example: "Na dom dev."
  -
    word: "dov"
    pronunciation: "DOV"
    type: "moral agency"
    meaning: "vow"
    usage: "Self-binding speech before witness."
    example: "Na dov tar mo mik."
  -
    word: "ten"
    pronunciation: "TEN"
    type: "moral agency"
    meaning: "am entrusted with"
    usage: "Duty received from another's trust."
    example: "Na ten hon."
  -
    word: "mor"
    pronunciation: "MOR"
    type: "moral agency"
    meaning: "inherited duty"
    usage: "Duty carried from ancestors, teachers, or history."
    example: "Na mor dev se."
  -
    word: "tor"
    pronunciation: "TOR"
    type: "moral agency"
    meaning: "chosen duty"
    usage: "Duty taken by explicit agency."
    example: "Na tor dev se."
  -
    word: "ren"
    pronunciation: "REN"
    type: "moral agency"
    meaning: "repair what was broken"
    usage: "Links action to restoration, not mere performance."
    example: "Na ren tar mak."
  -
    word: "so-na"
    pronunciation: "so-NA"
    type: "scope"
    meaning: "for myself"
    usage: "Agency limited to self-interest or self-cultivation."
    example: "Na val so-na."
  -
    word: "so-hen"
    pronunciation: "so-HEN"
    type: "scope"
    meaning: "for family"
    usage: "Agency undertaken for household or kin continuity."
    example: "Na val so-hen."
  -
    word: "so-lem"
    pronunciation: "so-LEM"
    type: "scope"
    meaning: "for people or civilization"
    usage: "Agency undertaken for the civic people and its future."
    example: "Na val so-lem."
  -
    word: "so-fer"
    pronunciation: "so-FER"
    type: "scope"
    meaning: "for the future"
    usage: "Agency under the moral claim of the unborn."
    example: "Na val so-fer."
  -
    word: "so-rah"
    pronunciation: "so-RAH"
    type: "scope"
    meaning: "before truth"
    usage: "Agency performed under visible truth and judgment."
    example: "Na val so-rah."
  -
    word: "so-zur"
    pronunciation: "so-ZUR"
    type: "scope"
    meaning: "before the sacred or ultimate"
    usage: "Agency under sacred witness; usable by theistic or secular speakers."
    example: "Na dov so-zur."
  -
    word: "ha"
    pronunciation: "ha"
    type: "register"
    meaning: "sacred or solemn speech"
    usage: "Precedes a sentence or word to raise ritual seriousness."
    example: "Ha na dov."
  -
    word: "mi"
    pronunciation: "mi"
    type: "register"
    meaning: "intimate address"
    usage: "Marks tenderness, vulnerability, or direct inward address."
    example: "Mi ti rah na."
  -
    word: "pu"
    pronunciation: "PU"
    type: "register"
    meaning: "public or civic address"
    usage: "Marks speech offered to citizens, institutions, or records."
    example: "Pu na nam dev."
  -
    word: "ke"
    pronunciation: "KE"
    type: "mood"
    meaning: "imperative"
    usage: "Direct command or plea, softened or sharpened by pronoun/register."
    example: "Ke rah na."
  -
    word: "ne"
    pronunciation: "NE"
    type: "polarity"
    meaning: "not"
    usage: "Negates the following verb, adjective, or particle chain."
    example: "Na ne val mak."
  -
    word: "e"
    pronunciation: "E"
    type: "grammar"
    meaning: "is; equals; be"
    usage: "Analytic copula for identity, class, and definition."
    example: "Mav e reh."
  -
    word: "bi"
    pronunciation: "BI"
    type: "grammar"
    meaning: "by; through"
    usage: "Marks instrument, means, or sustaining practice."
    example: "Lem naf bi mar."
  -
    word: "ko"
    pronunciation: "KO"
    type: "grammar"
    meaning: "with; alongside"
    usage: "Marks companionship or coordinated action."
    example: "Na pat ko ti."
  -
    word: "ad"
    pronunciation: "AD"
    type: "grammar"
    meaning: "to; toward; until"
    usage: "Marks direction, recipient, or limit."
    example: "Na pat ad nad wed."
  -
    word: "en"
    pronunciation: "EN"
    type: "grammar"
    meaning: "of; belonging to"
    usage: "Possession, source, or dependency."
    example: "Leb en na e kot rih."
  -
    word: "se"
    pronunciation: "SE"
    type: "grammar"
    meaning: "this"
    usage: "Near demonstrative."
    example: "Na vel dev se."
  -
    word: "mo"
    pronunciation: "MO"
    type: "grammar"
    meaning: "what; that which"
    usage: "Relative object or nominalized clause."
    example: "Na tar mo mik."
  -
    word: "ya"
    pronunciation: "YA"
    type: "mood"
    meaning: "question"
    usage: "Marks a direct question without changing word order."
    example: "Ya ta mar?"
  -
    word: "lo"
    pronunciation: "LO"
    type: "register"
    meaning: "respectful softener"
    usage: "Adds courtesy without lowering truth-content."
    example: "Lo ke nam."
  -
    word: "sol"
    pronunciation: "SOL"
    type: "intensity"
    meaning: "real; deep; truly"
    usage: "Intensifies toward full truth rather than mere volume."
    example: "Ke sol-rah na."
  -
    word: "ap"
    pronunciation: "AP"
    type: "aspect"
    meaning: "open; unhidden"
    usage: "Marks disclosed or unguarded state."
    example: "Leb en na e ap kot."
