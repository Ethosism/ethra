version: "0.2-program"
purpose: "Domain ontology for expanding Ethra toward full cultural coverage."
coverage_rule: "Each domain must define roots, derived terms, compounds, sentence templates, corpus examples, moral/relational usage, and register notes."
domains:
  -
    id: "daily-life"
    name: "Daily Life"
    target_roots_v02: 12
    target_entries_v02: 120
    target_entries_v10: 1200
    registers: ["plain", "intimate", "household"]
    priority: "highest"
    required_fields: ["food", "clothing", "sleep", "movement", "cleaning", "weather", "money", "work rhythms"]
    moral_questions: ["What is needed?", "Who is responsible?", "What is neglected?"]
  -
    id: "body-health"
