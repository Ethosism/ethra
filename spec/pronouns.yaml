pronouns:
  -
    word: "na"
    pronunciation: "NA"
    person: "first"
    number: "singular"
    stance: "self"
    meaning: "I; me"
    use: "Unmarked first person."
    example: "Na val."
  -
    word: "nel"
    pronunciation: "NEL"
    person: "first"
    number: "plural"
    stance: "chosen circle"
    meaning: "we of chosen commitment"
    use: "A voluntary we: team, covenant, project."
    example: "Nel ban."
  -
    word: "nen"
    pronunciation: "NEN"
    person: "first"
    number: "plural"
    stance: "family"
    meaning: "we of household or kin"
    use: "A kinship we."
    example: "Nen mor."
  -
    word: "num"
    pronunciation: "NUM"
    person: "first"
    number: "plural"
    stance: "people"
    meaning: "we as a people"
    use: "Civic or civilizational first person."
    example: "Num lem."
  -
    word: "ti"
    pronunciation: "TI"
    person: "second"
    number: "singular"
    stance: "intimate beloved"
    meaning: "you, beloved or inwardly close"
    use: "Direct tenderness or vulnerability."
    example: "Ti rah na."
  -
    word: "ta"
    pronunciation: "TA"
    person: "second"
    number: "singular"
    stance: "friend/equal"
    meaning: "you, friend or equal"
    use: "Default equal address."
    example: "Ta val."
  -
    word: "to"
    pronunciation: "TO"
    person: "second"
    number: "singular"
    stance: "elder/teacher"
    meaning: "you, elder or teacher"
    use: "Respect for instruction or senior responsibility."
    example: "To dak na."
  -
    word: "tu"
    pronunciation: "TU"
    person: "second"
    number: "singular"
    stance: "child/student"
    meaning: "you, child or learner"
    use: "Careful downward responsibility, not contempt."
    example: "Tu dak."
  -
    word: "te"
    pronunciation: "TE"
    person: "second"
    number: "singular"
    stance: "citizen/peer"
    meaning: "you, civic peer"
    use: "Public equal address."
    example: "Te pu nam."
  -
    word: "za"
    pronunciation: "ZA"
    person: "second"
    number: "singular"
    stance: "opponent"
    meaning: "you, opponent"
    use: "Conflict address that still names moral standing."
    example: "Za sak so-rah."
  -
    word: "hu"
    pronunciation: "HU"
    person: "second"
    number: "singular"
    stance: "sacred addressee"
    meaning: "You, sacred or ultimate addressee"
    use: "Prayer, vow, or direct ultimate address."
    example: "Hu rah na."
  -
    word: "tum"
    pronunciation: "TUM"
    person: "second"
    number: "plural"
    stance: "collective people"
    meaning: "you all; you as a people"
    use: "Collective address without erasing persons."
    example: "Tum mar."
  -
    word: "li"
    pronunciation: "LI"
    person: "third"
    number: "singular"
    stance: "person"
    meaning: "he, she, they-singular; that person"
    use: "Gender-neutral third person."
    example: "Li val."
  -
    word: "lu"
    pronunciation: "LU"
    person: "third"
    number: "plural"
    stance: "persons"
    meaning: "they; those persons"
    use: "Plural third person."
    example: "Lu ban."
  -
    word: "lo"
    pronunciation: "LO"
    person: "third"
    number: "singular"
    stance: "thing"
    meaning: "it; that thing"
    use: "Non-personal reference."
    example: "Lo e kot."
  -
    word: "hon"
    pronunciation: "HON"
    person: "third"
    number: "collective"
    stance: "household"
    meaning: "the family as a unit"
    use: "Family collective when the group acts as one."
    example: "Hon mor."
