version: "0.5.7"
purpose: "Machine-readable dictionary entry schema for Ethra's v1.0 lexicographic layer."
principle: "A civilizational dictionary must preserve root-depth, register, examples, corpus evidence, and governance status instead of flattening words into English glosses."
entry_fields:
  id: "Stable dictionary entry identifier."
  word: "Canonical Ethra surface form."
  source: "lexicon, particle, pronoun, or compound."
  pronunciation: "Romanized pronunciation guide."
  part_of_speech: "Lexical role or grammatical class."
  root: "Root family id where applicable."
  root_family: "Root category, core, and semantic field where applicable."
  pattern: "Productive derivation pattern where detectable."
  register: "Plain, civic, ritual, intimate, technical, legal, learner, or grammatical register."
  domain_tags: "Expansion domains served by the entry."
  meanings: "One or more concise sense statements."
  literal_etymology: "Visible morphology or root analysis."
  examples: "Accepted example sentences."
  corpus: "Corpus frequency, item ids, tracks, and observed registers."
  lifecycle_status: "accepted, candidate, provisional, deprecated, or historical."
  notes: "Governance and usage notes."
sources:
  lexicon: "Generated accepted root-pattern and core entries."
  particle: "Closed-class grammar, moral agency, scope, and register markers."
  pronoun: "Relational pronouns and stance markers."
  compound: "Curated compound terminology from spec/compounds.yaml."
frequency_bands:
  unattested: "No reviewed corpus item currently contains the term."
  observed: "1-2 reviewed corpus attestations."
  active: "3-9 reviewed corpus attestations."
  common: "10 or more reviewed corpus attestations."
lookup_policy:
  - "Exact word matches outrank meaning and etymology matches."
  - "Root and semantic-field matches are included because Ethra words belong to families."
  - "Corpus evidence never replaces governance status; it shows usage pressure."
  - "Unknown phonologically valid words should go through propose-term before dictionary admission."
cultural_notes:
  - "Dictionary scale should deepen memory, not bury speakers in disconnected synonyms."
  - "Every accepted entry should remain traceable to root, register, use, or corpus need."
  - "Frequency is descriptive evidence, not moral authority."
